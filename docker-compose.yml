services:
  gateway-be:
    build: .
    restart: unless-stopped
    environment:
      GATEWAY_APP_NAME: ${GATEWAY_APP_NAME}
      GATEWAY_APP_ENV: ${GATEWAY_APP_ENV}
      GATEWAY_DEBUG: ${GATEWAY_DEBUG}
      GATEWAY_API_V1_PREFIX: ${GATEWAY_API_V1_PREFIX}
      GATEWAY_DATABASE_URL: ${GATEWAY_DATABASE_URL}
      GATEWAY_CORS_ORIGINS: ${GATEWAY_CORS_ORIGINS}
      GATEWAY_AUTH_ENABLED: ${GATEWAY_AUTH_ENABLED}
      GATEWAY_AUTH_TOKENS: ${GATEWAY_AUTH_TOKENS}
      GATEWAY_AUTH_SECRET_KEY: ${GATEWAY_AUTH_SECRET_KEY}
      GATEWAY_AUTH_ACCESS_TOKEN_TTL_MINUTES: ${GATEWAY_AUTH_ACCESS_TOKEN_TTL_MINUTES}
      GATEWAY_BOOTSTRAP_ADMIN_USERNAME: ${GATEWAY_BOOTSTRAP_ADMIN_USERNAME}
      GATEWAY_BOOTSTRAP_ADMIN_PASSWORD: ${GATEWAY_BOOTSTRAP_ADMIN_PASSWORD}
      GATEWAY_BOOTSTRAP_ADMIN_FULL_NAME: ${GATEWAY_BOOTSTRAP_ADMIN_FULL_NAME}
      GATEWAY_RATE_LIMIT_ENABLED: ${GATEWAY_RATE_LIMIT_ENABLED}
      GATEWAY_RATE_LIMIT_REQUESTS: ${GATEWAY_RATE_LIMIT_REQUESTS}
      GATEWAY_RATE_LIMIT_WINDOW_SECONDS: ${GATEWAY_RATE_LIMIT_WINDOW_SECONDS}
      GATEWAY_PROVIDER_TIMEOUT_SECONDS: ${GATEWAY_PROVIDER_TIMEOUT_SECONDS}
      GATEWAY_PROVIDER_MAX_RETRIES: ${GATEWAY_PROVIDER_MAX_RETRIES}
      GATEWAY_PROVIDER_RETRY_BASE_DELAY_SECONDS: ${GATEWAY_PROVIDER_RETRY_BASE_DELAY_SECONDS}
      GATEWAY_ASYNC_JOB_DEFAULT_MAX_ATTEMPTS: ${GATEWAY_ASYNC_JOB_DEFAULT_MAX_ATTEMPTS}
      GATEWAY_ASYNC_JOB_RETRY_BASE_DELAY_SECONDS: ${GATEWAY_ASYNC_JOB_RETRY_BASE_DELAY_SECONDS}
      GATEWAY_ASYNC_JOB_RETRY_MAX_DELAY_SECONDS: ${GATEWAY_ASYNC_JOB_RETRY_MAX_DELAY_SECONDS}
      GATEWAY_ASYNC_JOB_BATCH_SIZE: ${GATEWAY_ASYNC_JOB_BATCH_SIZE}
      GATEWAY_WEBHOOK_TIMEOUT_SECONDS: ${GATEWAY_WEBHOOK_TIMEOUT_SECONDS}
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8000"
    volumes:
      - ${GATEWAY_DB_DIR:-./deploy/staging}:/app/data

  gateway-job-worker:
    build: .
    restart: unless-stopped
    command: ["sh", "-c", "./scripts/run_gateway_job_worker.sh"]
    environment:
      GATEWAY_APP_NAME: ${GATEWAY_APP_NAME}
      GATEWAY_APP_ENV: ${GATEWAY_APP_ENV}
      GATEWAY_DEBUG: ${GATEWAY_DEBUG}
      GATEWAY_API_V1_PREFIX: ${GATEWAY_API_V1_PREFIX}
      GATEWAY_DATABASE_URL: ${GATEWAY_DATABASE_URL}
      GATEWAY_CORS_ORIGINS: ${GATEWAY_CORS_ORIGINS}
      GATEWAY_AUTH_ENABLED: ${GATEWAY_AUTH_ENABLED}
      GATEWAY_AUTH_TOKENS: ${GATEWAY_AUTH_TOKENS}
      GATEWAY_AUTH_SECRET_KEY: ${GATEWAY_AUTH_SECRET_KEY}
      GATEWAY_AUTH_ACCESS_TOKEN_TTL_MINUTES: ${GATEWAY_AUTH_ACCESS_TOKEN_TTL_MINUTES}
      GATEWAY_BOOTSTRAP_ADMIN_USERNAME: ${GATEWAY_BOOTSTRAP_ADMIN_USERNAME}
      GATEWAY_BOOTSTRAP_ADMIN_PASSWORD: ${GATEWAY_BOOTSTRAP_ADMIN_PASSWORD}
      GATEWAY_BOOTSTRAP_ADMIN_FULL_NAME: ${GATEWAY_BOOTSTRAP_ADMIN_FULL_NAME}
      GATEWAY_RATE_LIMIT_ENABLED: ${GATEWAY_RATE_LIMIT_ENABLED}
      GATEWAY_RATE_LIMIT_REQUESTS: ${GATEWAY_RATE_LIMIT_REQUESTS}
      GATEWAY_RATE_LIMIT_WINDOW_SECONDS: ${GATEWAY_RATE_LIMIT_WINDOW_SECONDS}
      GATEWAY_PROVIDER_TIMEOUT_SECONDS: ${GATEWAY_PROVIDER_TIMEOUT_SECONDS}
      GATEWAY_PROVIDER_MAX_RETRIES: ${GATEWAY_PROVIDER_MAX_RETRIES}
      GATEWAY_PROVIDER_RETRY_BASE_DELAY_SECONDS: ${GATEWAY_PROVIDER_RETRY_BASE_DELAY_SECONDS}
      GATEWAY_ASYNC_JOB_DEFAULT_MAX_ATTEMPTS: ${GATEWAY_ASYNC_JOB_DEFAULT_MAX_ATTEMPTS}
      GATEWAY_ASYNC_JOB_RETRY_BASE_DELAY_SECONDS: ${GATEWAY_ASYNC_JOB_RETRY_BASE_DELAY_SECONDS}
      GATEWAY_ASYNC_JOB_RETRY_MAX_DELAY_SECONDS: ${GATEWAY_ASYNC_JOB_RETRY_MAX_DELAY_SECONDS}
      GATEWAY_ASYNC_JOB_BATCH_SIZE: ${GATEWAY_ASYNC_JOB_BATCH_SIZE}
      GATEWAY_WEBHOOK_TIMEOUT_SECONDS: ${GATEWAY_WEBHOOK_TIMEOUT_SECONDS}
      GATEWAY_JOB_RUNNER_INTERVAL_SECONDS: ${GATEWAY_JOB_RUNNER_INTERVAL_SECONDS}
    volumes:
      - ${GATEWAY_DB_DIR:-./deploy/staging}:/app/data
