name: Deploy Backend

on:
  push:
    branches:
      - staging
      - prod
  workflow_dispatch:

jobs:
  deploy-staging:
    if: github.ref_name == 'staging'
    runs-on:
      - self-hosted
      - linux
      - x64
      - gateway-dev
    steps:
      - name: Deploy backend on DEV
        run: |
          set -euo pipefail
          cd /home/vpsroot/apps/gateway-staging/be
          git fetch origin
          git checkout staging
          git reset --hard origin/staging
          chmod +x scripts/deploy-compose.sh
          ./scripts/deploy-compose.sh staging

  deploy-prod:
    if: github.ref_name == 'prod'
    runs-on:
      - self-hosted
      - linux
      - x64
      - gateway-prod
    steps:
      - name: Deploy backend on PROD
        run: |
          set -euo pipefail
          cd /home/vpsroot/apps/gateway-prod/be
          git fetch origin
          git checkout prod
          rm -rf docs/deployment
          rm -f scripts/backup-prod-db.sh scripts/restore-prod-db.sh
          git reset --hard origin/prod
          if [ -x scripts/backup-prod-db.sh ]; then
            ./scripts/backup-prod-db.sh
          fi
          chmod +x scripts/deploy-compose.sh
          ./scripts/deploy-compose.sh prod
