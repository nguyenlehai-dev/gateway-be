name: Deploy Backend

on:
  push:
    branches:
      - staging
      - prod
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.ref_name }}
    steps:
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          if [ "${TARGET_BRANCH}" = "prod" ]; then
            echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
            echo "${{ secrets.PROD_SSH_HOST }}" > /tmp/deploy_host
            echo "${{ secrets.PROD_SSH_USER }}" > /tmp/deploy_user
            echo "${{ secrets.PROD_BE_PATH }}" > /tmp/deploy_path
          else
            echo "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/deploy_key
            echo "${{ secrets.DEV_SSH_HOST }}" > /tmp/deploy_host
            echo "${{ secrets.DEV_SSH_USER }}" > /tmp/deploy_user
            echo "${{ secrets.DEV_BE_PATH }}" > /tmp/deploy_path
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$(cat /tmp/deploy_host)" >> ~/.ssh/known_hosts

      - name: Deploy backend on target VM
        run: |
          HOST="$(cat /tmp/deploy_host)"
          USER="$(cat /tmp/deploy_user)"
          PATH_ON_SERVER="$(cat /tmp/deploy_path)"
          if [ "${TARGET_BRANCH}" = "prod" ]; then
            ENV_NAME="prod"
            PRE_HOOK='if [ -x scripts/backup-prod-db.sh ]; then ./scripts/backup-prod-db.sh; fi'
          else
            ENV_NAME="staging"
            PRE_HOOK='true'
          fi

          ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" "
            set -euo pipefail
            cd '${PATH_ON_SERVER}'
            git fetch origin
            git checkout '${TARGET_BRANCH}'
            git pull --ff-only origin '${TARGET_BRANCH}'
            ${PRE_HOOK}
            chmod +x scripts/deploy-compose.sh
            ./scripts/deploy-compose.sh '${ENV_NAME}'
          "
